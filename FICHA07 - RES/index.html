<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap core CSS -->
    <link rel ="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"> 
  
    <!-- JQuery -->
    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
     
    <!-- Responsive Image maps -->
    <!-- Allows image maps to be used in a responsive design by recalculating the area coordinates  -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jQuery-rwdImageMaps/1.6/jquery.rwdImageMaps.min.js" integrity="sha512-eZB7hQa0bRlrKMQ2njpP0d/Klu6o30Gsr8e5FUCjUT3fSlnVkm/1J14n58BuwgaMuObrGb7SvUfQuF8qFsPU4g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <title>ImageMaps</title>
    
    <style>
        img {
          border: 8px solid #555;
        }
        .container {
            display: flex;
            justify-content: center; /* Centraliza horizontalmente */
        }   
        </style>
</head>

<body>

    <div class="mt-4 p-5 bg-warning text-white rounded">
        <h1 style="text-align:center">Licenciatura em Saúde Digital</h1>
        <h2 style="text-align:center">Descobre a tua Licenciatura!</h2>
    </div>  
    <br>
    <br>

<!-- Incorporar Vídeo  -->
    <video width="640" height="500" autoplay="false" controls class="img-fluid img-responsive rounded  mx-auto d-block"
        src="./videos/Digital Health Product Development.mp4" type="video/mp4">

    </video>

   <br>
   <div class = "container">
        <button id = "btnPlay">Play</button>
        <button id = "btnPause">Pause</button>
        <button id = "btnDuration">Duration</button>
        <button id = "btnStart">Go Start</button>
        <button id = "btnEnd">Go End</button>
        <button id = "btnFrame">Go Frame</button>
        <button id = "btnEditSource">Replace Video</button>
   </div>
    <br>
     <div class = "container">
        <p id="duration"></p> <br>  
     </div>




    <!-- javascript file -->
    <script  src="index.js"></script>
</body>
</html>
