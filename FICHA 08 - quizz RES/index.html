<!-- index.html -->
<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Quizz Cardiovascular</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 400px;
      text-align: center;
    }

    h1 { margin-bottom: 10px; }

    #progresso {
      font-size: 14px;
      color: gray;
      margin-bottom: 20px;
    }

    #pergunta {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .opcao {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      background: #e9ecef;
      cursor: pointer;
      transition: 0.2s;
    }

    .opcao:hover {
      background: #dee2e6;
    }

    .correta { background: #28a745 !important; color: white; }
    .errada { background: #dc3545 !important; color: white; }

    .btnQuizz {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    .btnQuizz:disabled {
      background: gray;
      cursor: not-allowed;
    }
  </style>
</head>



<body>


  <div class="card">
    <h1>Quizz</h1>
     <h2>Sistema Cardiovascular</h2>
    <p id="progresso">Desafia-te!</p>
    <p id="pergunta"></p>
    <div id="opcoes"></div>
    <button class = "opcao"></button>

    <button class = "btnQuizz" id="iniciar">Iniciar Quizz</button>
    <button class = "btnQuizz" id="next" hidden disabled>Próxima</button>
  </div>

  
  <script src="index.js" type = "module"></script>
</body>
</html>
