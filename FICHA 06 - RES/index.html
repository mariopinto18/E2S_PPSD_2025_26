<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap core CSS -->
    <link rel ="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"> 
  
    <!-- JQuery -->
    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
     
    <!-- Responsive Image maps -->
    <!-- Allows image maps to be used in a responsive design by recalculating the area coordinates  -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jQuery-rwdImageMaps/1.6/jquery.rwdImageMaps.min.js" integrity="sha512-eZB7hQa0bRlrKMQ2njpP0d/Klu6o30Gsr8e5FUCjUT3fSlnVkm/1J14n58BuwgaMuObrGb7SvUfQuF8qFsPU4g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <title>ImageMaps</title>
    
    <style>
        img {
          border: 4px solid #555;
        }
        </style>
</head>

<body>

    <div class="mt-4 p-5 bg-warning text-white rounded">
        <h1 style="text-align:center">Licenciatura em Saúde Digital</h1>
        <h2 style="text-align:center">Testa o teu conhecimento sobre Anatomia Humana!</h2>
    </div>  
    <br>
    <br>

<!-- Imagem com a definição de ImageMaps -->
    <img src="./images/esqueleto.png" usemap ="#workmap" alt="SaudeDigital"
             id= "IDesqueleto" class="img-fluid img-responsive rounded  mx-auto d-block">  
    
    <map name="workmap">
        <area shape="circle" coords="330,65, 60" style="width: 100%;" alt="cranio" 
              href= "#" id = "IDcranio">  

        <area shape="rect" coords="254,510,290,660" style="width: 100%;" alt="femur" 
              href= "#" id = "IDfemur">
        
        <area shape="rect" coords="260,720,280,830" style="width: 100%;" alt="tibia" 
              href= "#" id = "IDtibia">

        <area shape="rect" coords="250,710,265,810" style="width: 100%;" alt="peronio" 
              href= "#" id = "IDperonio">

        <area shape="poly" coords="35, 864, 660, 853, 645, 887, 35, 892" style="width: 100%;" alt="videoPromo" 
              href= "#" id = "videoPromo">

    </map>

    <br>
    <div class="d-flex justify-content-center mt-4">
         <button type="button" id="btnTrocaImagem" class="btn btn-warning ">Alterar entre imagens sem ou com legendas</button>
    </div>

  

    <!-- Modal para o texto ou Imagem  -->
    <dialog id="dlgContent">
        <img id="imgDialog" style="width: 100px; height: 100px;" src="" alt="">  
        <pre id="txtDialog1" readonly="true"></pre>      
        <br>
        <button id="btnClosedlgContent">FECHAR</button>
    </dialog>



    <!-- Modal para Vídeo  -->
    <dialog id = "dlgVideo">
        <iframe 
            id="iframeVideo" 
            title ="youtube video"
            width="640" 
            height="360" 
            allow="autoplay; clipboard-write;picture-in-picture" 
            src="">
        </iframe>
        <br>
            <button id="btnClosedlgVideo">FECHAR</button>
   </dialog>




    <!-- javascript file -->
    <script  src="index.js"></script>
</body>
</html>
